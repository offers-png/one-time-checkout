<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 48px;
      max-width: 500px;
    }
    .icon { font-size: 64px; margin-bottom: 16px; color: #16a34a; }
    h1 { color: #16a34a; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; }
    pre {
      font-size: 14px;
      background: #f0f0f0;
      padding: 16px;
      border-radius: 8px;
      display: inline-block;
      word-break: break-all;
      max-width: 100%;
    }
    .warning { color: #dc2626; font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Payment Successful</h1>
    <p>Your key is below. Save it — it won't be shown again.</p>
    <pre id="key">Loading...</pre>
    <p class="warning">Save this key now. This is sent once.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");
    const keyEl = document.getElementById("key");
    let attempts = 0;
    const maxAttempts = 20;

    async function fetchKey() {
      try {
        const res = await fetch(`/api/get-key?session_id=${sessionId}`);
        const data = await res.json();
        
        if (data.key) {
          keyEl.textContent = data.key;
          return true;
        }
      } catch (e) {}
      return false;
    }

    async function pollForKey() {
      keyEl.textContent = "Confirming payment...";
      
      while (attempts < maxAttempts) {
        const found = await fetchKey();
        if (found) return;
        
        attempts++;
        await new Promise(r => setTimeout(r, 1500));
      }
      
      keyEl.textContent = "Payment pending. Please refresh in a moment.";
    }

    pollForKey();
  </script>
</body>
</html>
