<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizing Payment — KeyAccess</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <a href="/" class="logo">
          <div class="logo-icon">🔑</div>
          KeyAccess
        </a>
      </div>
    </div>
  </header>

  <div class="page-wrap">
    <div class="status-card">
      <div class="spinner-wrap">
        <div class="spinner"></div>
      </div>
      <h1 style="font-size:22px;">Finalizing your payment…</h1>
      <p class="lead">Please wait a moment while we confirm your transaction. <strong>Do not refresh</strong> this page.</p>
    </div>
  </div>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="/terms.html">Terms of Service</a>
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/refunds.html">Refund Policy</a>
        <a href="/disclaimer.html">Disclaimer</a>
      </div>
      <div class="footer-copy">© 2025 KeyAccess. All rights reserved.</div>
    </div>
  </footer>

  <script>
    const sessionId = window.location.pathname.split('/').pop();

    async function check() {
      const res = await fetch(`/deliver/${sessionId}`);
      if (res.status === 200) {
        document.body.innerHTML = await res.text();
      } else {
        setTimeout(check, 1500);
      }
    }

    setTimeout(check, 1000);
  </script>
</body>
</html>
